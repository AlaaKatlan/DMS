<div class="sale-form-page" dir="rtl">
  <div class="form-container">
    <div class="form-header">
      <div class="header-content">
        <button type="button" routerLink="/books/sales" class="btn-back">
          <lucide-angular name="arrow-right" [size]="24"></lucide-angular>
        </button>
        <div class="title-group">
          <h2>فاتورة بيع جديدة</h2>
          <p class="subtitle">رقم الفاتورة: {{ invoiceNumber }}</p>
        </div>
      </div>
      <div class="header-actions">
        <button type="button" routerLink="/books/sales" class="btn btn-secondary">إلغاء</button>
        <button (click)="onSubmit()" [disabled]="invoiceForm.invalid || submitting" class="btn btn-primary">
          <lucide-angular *ngIf="submitting" name="loader-2" class="animate-spin" [size]="18"></lucide-angular>
          <span>{{ submitting ? 'جاري الحفظ...' : 'حفظ الفاتورة' }}</span>
        </button>
      </div>
    </div>

    <form [formGroup]="invoiceForm" class="form-content">
      <div class="card mb-4 bg-light border-info">
        <div class="card-body d-flex align-items-center gap-3 py-2">
          <lucide-angular name="percent" class="text-info" [size]="20"></lucide-angular>
          <label class="fw-bold mb-0">تطبيق حسم شامل على الكل (%):</label>
          <input type="number" #globalDisc class="form-control" style="width: 80px;" placeholder="35">
          <button type="button" (click)="applyGlobalDiscount(+globalDisc.value)" class="btn btn-info btn-sm">تطبيق</button>
          <small class="text-muted mr-3">* يمكنك تعديل كل صنف يدوياً بعد التطبيق</small>
        </div>
      </div>

      <div class="form-grid">
        <div class="card">
          <div class="card-header">
            <lucide-angular name="info" [size]="20"></lucide-angular>
            <h3>معلومات الفاتورة</h3>
          </div>
          <div class="card-body grid-2">
            <div class="form-group">
              <label>رقم الفاتورة</label>
              <input formControlName="invoice_number" type="text" readonly class="readonly">
            </div>
            <div class="form-group">
              <label>تاريخ البيع</label>
              <input formControlName="sale_date" type="date">
            </div>
            <div class="form-group col-span-2">
              <label>العميل</label>
              <select formControlName="customer_id">
                <option [ngValue]="null">عميل نقدي</option>
                <option *ngFor="let c of customers" [value]="c.id">{{ c.name }}</option>
              </select>
            </div>
            <div class="form-group">
              <label>طريقة الدفع</label>
              <select formControlName="payment_method">
                <option value="cash">نقدي</option>
                <option value="card">بطاقة</option>
                <option value="transfer">تحويل</option>
              </select>
            </div>
            <div class="form-group">
              <label>البائع</label>
              <input formControlName="seller_name" type="text" readonly class="readonly">
            </div>
          </div>
        </div>

        <div class="card items-card">
          <div class="card-header">
            <h3>الأصناف ({{ items.length }})</h3>
            <button type="button" (click)="addItem()" class="btn btn-sm btn-success">إضافة صنف</button>
          </div>
          <div class="card-body">
            <div formArrayName="items" class="items-list">
              <div *ngFor="let item of items.controls; let i = index" [formGroupName]="i" class="item-row border-bottom pb-3 mb-3">
                <div class="item-fields d-flex gap-2 flex-wrap">
                  <div class="field-group flex-grow-1">
                    <label>الكتاب</label>
                    <select formControlName="book_id" (change)="onBookChange(i)">
                      <option [ngValue]="null">اختر الكتاب</option>
                      <option *ngFor="let b of books" [value]="b.book_id">{{ b.title }}</option>
                    </select>
                  </div>
                  <div class="field-group" style="width: 80px;">
                    <label>الكمية</label>
                    <input formControlName="quantity" type="number" (input)="calculateItemTotal(i)">
                  </div>
                  <div class="field-group" style="width: 120px;">
                    <label>السعر</label>
                    <input formControlName="unit_price_syp" type="number" readonly class="readonly">
                  </div>
                  <div class="field-group" style="width: 100px;">
                    <label class="text-danger fw-bold">حسم (%)</label>
                    <input formControlName="discount_percentage" type="number" (input)="calculateItemTotal(i)" class="border-danger">
                  </div>
                  <div class="field-group" style="width: 130px;">
                    <label>الإجمالي</label>
                    <input formControlName="total_syp" type="number" readonly class="readonly fw-bold">
                  </div>
                  <button type="button" (click)="removeItem(i)" class="btn-delete align-self-end mb-1">
                    <lucide-angular name="trash-2" [size]="18"></lucide-angular>
                  </button>
                </div>
              </div>
            </div>

            <div class="total-summary mt-3 p-3 bg-dark text-white rounded">
              <div class="d-flex justify-content-between">
                <span>المجموع الكلي:</span>
                <span class="fs-4">{{ invoiceForm.get('total')?.value | number }} SYP</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
