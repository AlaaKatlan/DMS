<!-- src/app/features/books/components/book-sale-form/book-sale-form.component.html -->
<div class="sale-form-page" dir="rtl">
  <div class="form-container">
    <!-- HEADER -->
    <div class="form-header">
      <div class="header-content">
        <button type="button" routerLink="/books/sales" class="btn-back">
          <lucide-angular name="arrow-right" [size]="24"></lucide-angular>
        </button>
        <div class="title-group">
          <h2>فاتورة بيع جديدة</h2>
          <p class="subtitle">رقم الفاتورة: {{ invoiceNumber }}</p>
        </div>
      </div>

      <div class="header-actions">
        <button type="button" routerLink="/books/sales" class="btn btn-secondary">إلغاء</button>
        <button (click)="onSubmit()" [disabled]="invoiceForm.invalid || submitting" class="btn btn-primary">
          <lucide-angular *ngIf="submitting" name="loader-2" class="animate-spin" [size]="18"></lucide-angular>
          <span>{{ submitting ? 'جاري الحفظ...' : 'حفظ الفاتورة' }}</span>
        </button>
      </div>
    </div>

    <form [formGroup]="invoiceForm" class="form-content">
      <div class="form-grid">
        <!-- المعلومات الأساسية -->
        <div class="card">
          <div class="card-header">
            <lucide-angular name="info" [size]="20"></lucide-angular>
            <h3>معلومات الفاتورة</h3>
          </div>

          <div class="card-body grid-2">
            <div class="form-group">
              <label>رقم الفاتورة <span class="required">*</span></label>
              <input formControlName="invoice_number" type="text" readonly class="readonly">
            </div>

            <div class="form-group">
              <label>تاريخ البيع <span class="required">*</span></label>
              <input formControlName="sale_date" type="date">
            </div>

            <div class="form-group col-span-2">
              <label>العميل</label>
              <div class="customer-select-group">
                <select formControlName="customer_id">
                  <option [ngValue]="null">عميل نقدي (بدون تسجيل)</option>
                  <option *ngFor="let customer of customers" [value]="customer.id">
                    {{ customer.name }}
                  </option>
                </select>
                <input
                  *ngIf="!invoiceForm.get('customer_id')?.value"
                  type="text"
                  formControlName="customer_name"
                  placeholder="اسم العميل (اختياري)"
                  class="mt-2"
                >
              </div>
            </div>

            <div class="form-group">
              <label>طريقة الدفع <span class="required">*</span></label>
              <select formControlName="payment_method">
                <option value="cash">نقدي</option>
                <option value="card">بطاقة</option>
                <option value="transfer">تحويل بنكي</option>
              </select>
            </div>

            <div class="form-group">
              <label>البائع</label>
              <input formControlName="seller_name" type="text" readonly class="readonly">
            </div>

            <div class="form-group col-span-2">
              <label>ملاحظات</label>
              <textarea formControlName="notes" rows="2" placeholder="ملاحظات إضافية..."></textarea>
            </div>
          </div>
        </div>

        <!-- الأصناف -->
        <div class="card items-card">
          <div class="card-header">
            <div class="header-left">
              <lucide-angular name="package" [size]="20"></lucide-angular>
              <h3>الأصناف ({{ items.length }})</h3>
            </div>
            <button type="button" (click)="addItem()" class="btn btn-sm btn-success">
              <lucide-angular name="plus" [size]="16"></lucide-angular>
              إضافة صنف
            </button>
          </div>

          <div class="card-body">
            <div formArrayName="items" class="items-list">
              <div *ngFor="let item of items.controls; let i = index" [formGroupName]="i" class="item-row">
                <div class="item-number">{{ i + 1 }}</div>

                <div class="item-fields">
                  <div class="field-group book-select">
                    <label>الكتاب <span class="required">*</span></label>
                    <select formControlName="book_id" (change)="onBookChange(i)">
                      <option [ngValue]="null">اختر الكتاب</option>
                      <option *ngFor="let book of books" [value]="book.book_id">
                        {{ book.title }} - {{ book.author }}
                      </option>
                    </select>
                  </div>

                  <div class="field-group quantity">
                    <label>الكمية <span class="required">*</span></label>
                    <input formControlName="quantity" type="number" min="1" (input)="calculateItemTotal(i)">
                  </div>

                  <div class="field-group price">
                    <label>سعر الوحدة (SYP)</label>
                    <input formControlName="unit_price_syp" type="number" step="0.01" readonly class="readonly">
                  </div>

                  <div class="field-group total">
                    <label>الإجمالي (SYP)</label>
                    <input formControlName="total_syp" type="number" readonly class="readonly bold">
                  </div>

                  <div class="field-group notes-field">
                    <label>ملاحظات</label>
                    <input formControlName="notes" type="text" placeholder="ملاحظات...">
                  </div>

                  <div class="field-group actions">
                    <button type="button" (click)="removeItem(i)" class="btn-delete"
                            [disabled]="items.length === 1"
                            title="حذف الصنف">
                      <lucide-angular name="trash-2" [size]="18"></lucide-angular>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- الإجمالي الكلي -->
            <div class="total-summary">
              <div class="summary-row">
                <span class="label">الإجمالي الكلي:</span>
                <span class="value">{{ getTotalAmount().toLocaleString('en-US') }} SYP</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
