<div class="form-container" dir="rtl">
  <div class="form-header">
    <div class="header-text">
      <h1>{{ form.get('id')?.value ? 'تعديل بيانات المورد' : 'إضافة مورد جديد' }}</h1>
      <p>أدخل بيانات المورد وجهات الاتصال الخاصة به</p>
    </div>
    <button class="btn-back" routerLink="/suppliers">
      <lucide-angular name="arrow-right" [size]="20"></lucide-angular>
      عودة للقائمة
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="main-form">

    <div class="form-section card">
      <h3 class="section-title">
        <div class="icon-bg"><lucide-angular name="building" [size]="20"></lucide-angular></div>
        المعلومات الأساسية
      </h3>

      <div class="grid-2">
        <div class="form-group">
          <label>اسم المورد <span class="required">*</span></label>
          <div class="input-wrapper">
            <input type="text" formControlName="name" placeholder="مثال: مطبعة الألوان" [class.error]="form.get('name')?.invalid && form.get('name')?.touched">
          </div>
        </div>

        <div class="form-group">
          <label>نوع الخدمة <span class="required">*</span></label>
          <div class="input-wrapper">
            <select formControlName="service_type">
              <option value="printing">طباعة (Printing)</option>
              <option value="logistics">شحن (Logistics)</option>
              <option value="material">مواد خام (Material)</option>
              <option value="freelancer">عمل حر (Freelancer)</option>
              <option value="freelancer">وسائل تعليمية (Teaching Aids)</option>
              <option value="other">أخرى</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>البلد <span class="required">*</span></label>
          <div class="input-wrapper">
            <select formControlName="country_id" [class.error]="form.get('country_id')?.invalid && form.get('country_id')?.touched">
              <option [ngValue]="null">اختر الدولة...</option>
              @for (country of countries; track country.id) {
                <option [value]="country.id">{{ country.name }}</option>
              }
            </select>
          </div>
        </div>

        <!-- <div class="form-group">
          <label>الرقم الضريبي</label>
          <div class="input-wrapper">
            <input type="text" formControlName="tax_id" placeholder="اختياري">
          </div>
        </div> -->

        <!-- <div class="form-group">
          <label>فترة التوريد (أيام)</label>
          <div class="input-wrapper">
            <input type="number" formControlName="lead_time_days" placeholder="0">
          </div>
        </div> -->

        <div class="form-group">
          <label>العملة الافتراضية</label>
          <div class="input-wrapper">
            <select formControlName="default_currency">
              <option value="USD">USD ($)</option>
              <option value="SYP">SYP (SYP)</option>
              <option value="AED">AED (د.إ)</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="form-section card">
      <div class="section-header-row">
        <h3 class="section-title">
          <div class="icon-bg"><lucide-angular name="users" [size]="20"></lucide-angular></div>
          جهات الاتصال
        </h3>
        <button type="button" class="btn-add-contact" (click)="addContact()">
          <lucide-angular name="plus" [size]="16"></lucide-angular>
          إضافة شخص
        </button>
      </div>

      <div formArrayName="contacts" class="contacts-container">
        @for (contact of contacts.controls; track $index) {
          <div [formGroupName]="$index" class="contact-card">
            <div class="contact-header">
              <span class="contact-title">
                <lucide-angular name="user" [size]="16" class="text-gray-400"></lucide-angular>
                شخص للتواصل #{{ $index + 1 }}
              </span>
              <button type="button" class="btn-delete-contact" (click)="removeContact($index)" title="حذف">
                <lucide-angular name="trash-2" [size]="16"></lucide-angular>
                حذف
              </button>
            </div>

            <div class="contact-body grid-2 small-gap">
              <div class="form-group">
                <label>الاسم</label>
                <input type="text" formControlName="name" placeholder="الاسم الكريم">
              </div>
              <div class="form-group">
                <label>الصفة / المسمى</label>
                <input type="text" formControlName="role" placeholder="مثال: مدير المبيعات">
              </div>
              <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" formControlName="email" placeholder="example@mail.com">
              </div>
              <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="text" formControlName="phone" placeholder="09xxxxxxxx">
              </div>
            </div>
          </div>
        }

        @if (contacts.length === 0) {
          <div class="empty-contacts">
            <lucide-angular name="user-plus" [size]="32"></lucide-angular>
            <p>لا يوجد جهات اتصال مضافة.</p>
            <button type="button" (click)="addContact()">أضف أول جهة اتصال</button>
          </div>
        }
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" routerLink="/suppliers">إلغاء</button>
      <button type="submit" class="btn-submit" [disabled]="form.invalid || isSubmitting">
        <lucide-angular *ngIf="!isSubmitting" name="save" [size]="18"></lucide-angular>
        <span *ngIf="isSubmitting" class="spinner-small"></span>
        {{ isSubmitting ? 'جاري الحفظ...' : 'حفظ البيانات' }}
      </button>
    </div>
  </form>
</div>
